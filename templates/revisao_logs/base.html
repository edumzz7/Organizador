<!-- templates/base.html -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Plataforma de Revisão{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Bloco para dados JSON, usado por páginas específicas -->
    {% block scripts_data %}{% endblock %}
</head>
<body>
    <div class="container">
        <!-- Mensagens Flash (Alertas) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- O conteúdo principal de cada página será inserido aqui -->
        {% block content %}{% endblock %}
    </div>
    
    <!-- O nosso script principal, carregado no final -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
